trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  MAVEN_CACHE_FOLDER: $(Pipeline.Workspace)/.m2/repository
  MAVEN_OPTS: '-Dmaven.repo.local=$(MAVEN_CACHE_FOLDER)'

stages:
  - stage: Test
    displayName: 'Run API Automation Tests'
    jobs:
      - job: RunTests
        displayName: 'Build & Test - Restful Booker API'
        timeoutInMinutes: 30

        steps:
          # ── 1. Checkout ──────────────────────────────────────────────
          - checkout: self
            displayName: 'Checkout Repository'

          # ── 2. Java 21 ───────────────────────────────────────────────
          - task: JavaToolInstaller@0
            displayName: 'Set up JDK 21'
            inputs:
              versionSpec: '21'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'

          # ── 3. Maven dependency cache ────────────────────────────────
          - task: Cache@2
            displayName: 'Cache Maven Dependencies'
            inputs:
              key: 'maven | "$(Agent.OS)" | **/pom.xml'
              restoreKeys: |
                maven | "$(Agent.OS)"
                maven
              path: $(MAVEN_CACHE_FOLDER)

          # ── 4. Run tests ─────────────────────────────────────────────
          - task: Maven@4
            displayName: 'mvn clean test'
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'clean test'
              options: '-B $(MAVEN_OPTS)'
              publishJUnitResults: true
              testResultsFiles: '**/surefire-reports/TEST-*.xml'
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '1.21'
              mavenVersionOption: 'Default'
            continueOnError: true   # publish reports even when tests fail

          # ── 5. Publish Cucumber HTML report ──────────────────────────
          - task: PublishHtmlReport@1
            displayName: 'Publish Cucumber HTML Report'
            condition: always()
            inputs:
              reportDir: 'target/cucumber-reports'
              tabName: 'Cucumber Report'

          # ── 6. Publish test artifacts (JSON / XML / ExtentReports) ───
          - task: PublishBuildArtifacts@1
            displayName: 'Publish Cucumber Reports Artifact'
            condition: always()
            inputs:
              pathToPublish: 'target/cucumber-reports'
              artifactName: 'cucumber-reports'
              publishLocation: 'Container'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Extent Reports Artifact'
            condition: always()
            inputs:
              pathToPublish: 'target/extent-reports'
              artifactName: 'extent-reports'
              publishLocation: 'Container'
